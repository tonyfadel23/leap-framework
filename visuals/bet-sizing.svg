<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="700" height="300" rx="16" fill="#0f0f14"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" fill="#f4f4f5" font-size="16" font-weight="700">Bet Sizing: Match Size to Confidence</text>
  <text x="350" y="55" text-anchor="middle" fill="#6b7280" font-size="11">Low confidence ≠ skip. Low confidence = Scout. Get one signal.</text>

  <!-- Scout -->
  <rect x="40" y="80" width="140" height="160" rx="10" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="1.5"/>
  <text x="110" y="110" text-anchor="middle" fill="#10b981" font-size="18" font-weight="700">SCOUT</text>
  <text x="110" y="132" text-anchor="middle" fill="#10b981" font-size="11" font-weight="500">Hours – 2 days</text>
  <line x1="70" y1="142" x2="150" y2="142" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
  <text x="110" y="162" text-anchor="middle" fill="#6b7280" font-size="10">Low confidence</text>
  <text x="110" y="178" text-anchor="middle" fill="#6b7280" font-size="10">"We think this</text>
  <text x="110" y="192" text-anchor="middle" fill="#6b7280" font-size="10">might matter"</text>
  <text x="110" y="220" text-anchor="middle" fill="#4b5563" font-size="9" font-style="italic">40-50% of bets</text>

  <!-- Sprint -->
  <rect x="200" y="80" width="140" height="160" rx="10" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-width="1.5"/>
  <text x="270" y="110" text-anchor="middle" fill="#6366f1" font-size="18" font-weight="700">SPRINT</text>
  <text x="270" y="132" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="500">1 – 2 weeks</text>
  <line x1="230" y1="142" x2="310" y2="142" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="270" y="162" text-anchor="middle" fill="#6b7280" font-size="10">Medium confidence</text>
  <text x="270" y="178" text-anchor="middle" fill="#6b7280" font-size="10">"Evidence</text>
  <text x="270" y="192" text-anchor="middle" fill="#6b7280" font-size="10">suggests this"</text>
  <text x="270" y="220" text-anchor="middle" fill="#4b5563" font-size="9" font-style="italic">30-35% of bets</text>

  <!-- Campaign -->
  <rect x="360" y="80" width="140" height="160" rx="10" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="430" y="110" text-anchor="middle" fill="#f59e0b" font-size="18" font-weight="700">CAMPAIGN</text>
  <text x="430" y="132" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="500">2 – 4 weeks</text>
  <line x1="390" y1="142" x2="470" y2="142" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="430" y="162" text-anchor="middle" fill="#6b7280" font-size="10">High confidence</text>
  <text x="430" y="178" text-anchor="middle" fill="#6b7280" font-size="10">"Validated in</text>
  <text x="430" y="192" text-anchor="middle" fill="#6b7280" font-size="10">Scout/Sprint"</text>
  <text x="430" y="220" text-anchor="middle" fill="#4b5563" font-size="9" font-style="italic">15-20% of bets</text>

  <!-- Moonshot -->
  <rect x="520" y="80" width="140" height="160" rx="10" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="1.5"/>
  <text x="590" y="110" text-anchor="middle" fill="#ef4444" font-size="16" font-weight="700">MOONSHOT</text>
  <text x="590" y="132" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="500">4 – 8 weeks</text>
  <line x1="550" y1="142" x2="630" y2="142" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
  <text x="590" y="162" text-anchor="middle" fill="#6b7280" font-size="10">Very high confidence</text>
  <text x="590" y="178" text-anchor="middle" fill="#6b7280" font-size="10">"Strategic</text>
  <text x="590" y="192" text-anchor="middle" fill="#6b7280" font-size="10">commitment"</text>
  <text x="590" y="220" text-anchor="middle" fill="#4b5563" font-size="9" font-style="italic">0-5% of bets</text>

  <!-- Confidence arrow -->
  <line x1="80" y1="265" x2="620" y2="265" stroke="#4b5563" stroke-width="1"/>
  <polygon points="618,261 628,265 618,269" fill="#4b5563"/>
  <text x="350" y="285" text-anchor="middle" fill="#4b5563" font-size="10">Confidence increases →</text>
</svg>
