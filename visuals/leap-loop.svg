<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="proveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="learnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="exploreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="actionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="#0f0f14"/>

  <!-- PROVE layer background -->
  <rect x="40" y="40" width="720" height="420" rx="12" fill="url(#proveGrad)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>

  <!-- PROVE label -->
  <text x="400" y="75" text-anchor="middle" fill="#6366f1" font-size="13" font-weight="700" letter-spacing="6">P R O V E</text>
  <text x="400" y="95" text-anchor="middle" fill="#6b7280" font-size="11">continuous evaluation layer — Ship · Iterate · Pivot · Kill</text>

  <!-- LEARN box -->
  <rect x="80" y="160" width="180" height="120" rx="12" fill="url(#learnGrad)"/>
  <text x="170" y="210" text-anchor="middle" fill="white" font-size="20" font-weight="700">LEARN</text>
  <text x="170" y="232" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Abstract</text>
  <text x="170" y="248" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">TAP + Relationship</text>
  <text x="170" y="262" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">Hierarchy</text>

  <!-- Arrow L→E -->
  <line x1="260" y1="220" x2="300" y2="220" stroke="#a5b4fc" stroke-width="2"/>
  <polygon points="300,215 310,220 300,225" fill="#a5b4fc"/>

  <!-- EXPLORE box -->
  <rect x="310" y="160" width="180" height="120" rx="12" fill="url(#exploreGrad)"/>
  <text x="400" y="210" text-anchor="middle" fill="white" font-size="20" font-weight="700">EXPLORE</text>
  <text x="400" y="232" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Creative</text>
  <text x="400" y="248" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">Diverge → Stress-Test</text>
  <text x="400" y="262" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">→ Converge</text>

  <!-- Arrow E→A -->
  <line x1="490" y1="220" x2="530" y2="220" stroke="#a5b4fc" stroke-width="2"/>
  <polygon points="530,215 540,220 530,225" fill="#a5b4fc"/>

  <!-- ACTION box -->
  <rect x="540" y="160" width="180" height="120" rx="12" fill="url(#actionGrad)"/>
  <text x="630" y="210" text-anchor="middle" fill="white" font-size="20" font-weight="700">ACTION</text>
  <text x="630" y="232" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Tactical</text>
  <text x="630" y="248" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">Scout · Sprint</text>
  <text x="630" y="262" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">Campaign · Moonshot</text>

  <!-- Loop arrow (ACTION back to LEARN) -->
  <path d="M 630 280 L 630 340 Q 630 360 610 360 L 190 360 Q 170 360 170 340 L 170 280" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="165,282 170,272 175,282" fill="#6366f1"/>
  <text x="400" y="378" text-anchor="middle" fill="#6366f1" font-size="10" font-style="italic">Loop (enriched by PROVE)</text>

  <!-- Ship exit -->
  <text x="630" y="410" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600">Ship → Exit Loop</text>
  <text x="630" y="426" text-anchor="middle" fill="#6b7280" font-size="9">Scale &amp; Operate</text>

  <!-- Title -->
  <text x="400" y="470" text-anchor="middle" fill="#f4f4f5" font-size="14" font-weight="700">LEAP: Learn · Explore · Action · Prove</text>

  <!-- Subtitle -->
  <text x="400" y="488" text-anchor="middle" fill="#6b7280" font-size="10">The unit of progress is the resolved bet, not the shipped feature.</text>
</svg>
