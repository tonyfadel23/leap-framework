<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f14"/>
      <stop offset="100%" style="stop-color:#13131a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="440" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" fill="#f4f4f5" font-size="16" font-weight="700">Customer Relationship Hierarchy</text>
  <text x="300" y="55" text-anchor="middle" fill="#6b7280" font-size="11">Maslow for product. Solve the current stage before building for the next.</text>

  <!-- Pyramid levels (bottom to top) -->

  <!-- Level 1: Functional (widest) -->
  <polygon points="60,380 540,380 480,320 120,320" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <text x="300" y="358" text-anchor="middle" fill="#ef4444" font-size="15" font-weight="700">FUNCTIONAL</text>
  <text x="300" y="374" text-anchor="middle" fill="#6b7280" font-size="9">"It works, I guess" — Fix reliability. Don't add features.</text>

  <!-- Level 2: Trustworthy -->
  <polygon points="120,320 480,320 430,260 170,260" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  <text x="300" y="298" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="700">TRUSTWORTHY</text>
  <text x="300" y="314" text-anchor="middle" fill="#6b7280" font-size="9">"I can count on it" — Build consistency. Remove uncertainty.</text>

  <!-- Level 3: Engaging -->
  <polygon points="170,260 430,260 380,200 220,200" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="300" y="238" text-anchor="middle" fill="#8b5cf6" font-size="15" font-weight="700">ENGAGING</text>
  <text x="300" y="254" text-anchor="middle" fill="#6b7280" font-size="9">"I enjoy using it" — Add depth. Personalize.</text>

  <!-- Level 4: Valuable -->
  <polygon points="220,200 380,200 340,140 260,140" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="300" y="178" text-anchor="middle" fill="#6366f1" font-size="15" font-weight="700">VALUABLE</text>
  <text x="300" y="194" text-anchor="middle" fill="#6b7280" font-size="9">"I get real value" — Expand the relationship.</text>

  <!-- Level 5: Loved (top) -->
  <polygon points="260,140 340,140 300,80" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
  <text x="300" y="120" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700">LOVED</text>
  <text x="300" y="134" text-anchor="middle" fill="#6b7280" font-size="9">"I tell everyone"</text>

  <!-- Arrow on right side -->
  <line x1="555" y1="370" x2="555" y2="90" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="550,92 555,80 560,92" fill="#4b5563"/>
  <text x="568" y="235" fill="#4b5563" font-size="9" transform="rotate(-90, 568, 235)">Solve bottom → up</text>

  <!-- Footer -->
  <text x="300" y="415" text-anchor="middle" fill="#6b7280" font-size="10">Don't build personalization when search is broken.</text>
  <text x="300" y="430" text-anchor="middle" fill="#6b7280" font-size="10">Don't build delight when customers can't trust your delivery time.</text>
</svg>
